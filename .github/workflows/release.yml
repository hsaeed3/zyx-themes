name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Get local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get published version
        id: published
        run: |
          PUBLISHED=$(vsce show hsaeed3.zyx-themes 2>/dev/null | grep -oP 'Version:\s+\K[0-9]+\.[0-9]+\.[0-9]+' | head -1) || true
          echo "version=$PUBLISHED" >> $GITHUB_OUTPUT

      - name: Check if newer
        id: check
        run: |
          LOCAL=${{ steps.local.outputs.version }}
          PUBLISHED="${{ steps.published.outputs.version }}"
          if [ -z "$PUBLISHED" ]; then
            echo "No published version found — first publish"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            IS_NEWER=$(node -e "
              const [la,lb,lc] = '$LOCAL'.split('.').map(Number);
              const [pa,pb,pc] = '$PUBLISHED'.split('.').map(Number);
              const newer = la > pa || (la === pa && lb > pb) || (la === pa && lb === pb && lc > pc);
              console.log(newer ? 'true' : 'false');
            ")
            echo "should_release=$IS_NEWER" >> $GITHUB_OUTPUT
            echo "Local: $LOCAL | Published: $PUBLISHED | Should release: $IS_NEWER"
          fi

      - name: Package extension
        if: steps.check.outputs.should_release == 'true'
        run: vsce package

      - name: Publish to VS Code Marketplace
        if: steps.check.outputs.should_release == 'true'
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.check.outputs.should_release == 'true'
        run: ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.local.outputs.version }}
          files: "*.vsix"
          generate_release_notes: true
